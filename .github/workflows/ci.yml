name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  COVERAGE_MIN: "1"

jobs:
  lint:
    name: lint (go 1.26.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: disable go telemetry
        run: go telemetry off

      - name: gofmt
        run: |
          files=$(git ls-files '*.go' | xargs gofmt -l)
          if [ -n "$files" ]; then
            echo "gofmt needed:"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          only-new-issues: true

  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # stable may currently resolve to 1.26.x; it starts catching the next stable Go release when available.
        go-version: ['1.26.x', 'stable']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: disable go telemetry
        run: go telemetry off

      - name: go test
        run: go test ./...

  race:
    name: race (go 1.26.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: disable go telemetry
        run: go telemetry off

      - name: race test
        run: go test -race ./...

  coverage:
    name: coverage (go 1.26.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: disable go telemetry
        run: go telemetry off

      - name: coverage
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: coverage gate
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          awk -v total="$total" -v min="$COVERAGE_MIN" 'BEGIN {
            if (total + 0 < min + 0) {
              printf "coverage %.1f%% below required %.1f%%\n", total, min
              exit 1
            }
            printf "coverage %.1f%% >= required %.1f%%\n", total, min
          }'
